<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Sensores IoT</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: #eee; margin: 0; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        h1 { color: #e94560; margin-bottom: 30px; }
        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; }
        .card { background: #16213e; border-radius: 15px; padding: 25px; min-width: 220px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.3); border-top: 5px solid #e94560; }
        .label { font-size: 0.9em; text-transform: uppercase; letter-spacing: 1px; color: #888; }
        .value { font-size: 2.5em; color: #fff; font-weight: bold; margin: 10px 0; }
        .footer { margin-top: 30px; font-size: 0.8em; color: #555; }
    </style>
</head>
<body>
    <h1>📡 Dashboard IoT - Raspberry Pi Madrid</h1>
    
    <div class="container">
        <div class="card">
            <div class="label">Temperatura</div>
            <div class="value" id="temp">-- °C</div>
        </div>
        <div class="card">
            <div class="label">Humedad</div>
            <div class="value" id="hum">-- %</div>
        </div>
    </div>

    <div class="footer">
        Última actualización: <span id="ts">Cargando...</span>
    </div>

    <script>
        async function fetchData() {
            try {
                // Buscamos el archivo generado por la Lambda
                const res = await fetch('data.json');
                const data = await res.json();
                
                if (data.Items && data.Items.length > 0) {
                    // El primer elemento (index 0) es el más reciente
                    const latest = data.Items[0]; 
                    
                    document.getElementById('temp').textContent = (latest.temperature !== "None") ? latest.temperature + ' °C' : "Leyendo...";
                    document.getElementById('hum').textContent = (latest.humidity !== "None") ? latest.humidity + ' %' : "Leyendo...";
                    document.getElementById('ts').textContent = new Date(latest.timestamp).toLocaleString();
                }
            } catch(e) { 
                console.error("Error cargando datos:", e); 
            }
        }
        
        fetchData();
        setInterval(fetchData, 30000); // Refrescar cada 30 segundos
    </script>
</body>
</html>
